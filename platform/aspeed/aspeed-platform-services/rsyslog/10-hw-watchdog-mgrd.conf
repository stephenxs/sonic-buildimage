# Route hw-watchdog-mgrd daemon logs to a dedicated, persistent file on eMMC.
#
# /var/log is tmpfs on this platform, so the watchdog (a critical service) logs
# to /host/bmc/watchdog.log on persistent storage instead.  Remote forwarding
# (log export) happens before this drop-in is evaluated, so exported logs still
# include these messages; the "stop" keeps them out of /var/log/syslog.
#
# Installed by the aspeed-platform-services package.
if $programname == 'hw-watchdog-mgrd' then {
    action(type="omfile" file="/host/bmc/watchdog.log")
    stop
}
